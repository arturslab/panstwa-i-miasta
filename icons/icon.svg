<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="80"/>
  <text x="256" y="340" font-family="Arial Black,sans-serif" font-weight="900"
        font-size="310" text-anchor="middle" fill="url(#fg)" filter="url(#glow)">P</text>
  <text x="256" y="430" font-family="Arial,sans-serif" font-weight="300"
        font-size="42" text-anchor="middle" fill="rgba(255,255,255,0.35)"
        letter-spacing="6">PAŃSTWA I MIASTA</text>
</svg>
