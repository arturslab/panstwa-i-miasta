<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Państwa i Miasta</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#302b63">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="P&amp;M">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 1.5rem 1rem;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(60px);
            opacity: 0.15;
            animation: drift linear infinite;
        }

        @keyframes drift {
            0%   { transform: translate(0,0) scale(1); }
            33%  { transform: translate(40px,-60px) scale(1.1); }
            66%  { transform: translate(-30px,30px) scale(0.9); }
            100% { transform: translate(0,0) scale(1); }
        }

        .title {
            color: rgba(255,255,255,0.9);
            font-size: clamp(1.1rem, 3vw, 2rem);
            font-weight: 300;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            text-shadow: 0 0 40px rgba(130,180,255,0.6);
            z-index: 1;
            margin-bottom: 0.3rem;
        }

        #hint {
            color: rgba(255,255,255,0.35);
            font-size: clamp(0.7rem, 1.3vw, 0.95rem);
            letter-spacing: 0.12em;
            margin-bottom: 0.3rem;
            z-index: 1;
            min-height: 1.2em;
        }

        /* Letter area */
        #letter-wrap {
            position: relative;
            width: 50vmin;
            height: 50vmin;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            z-index: 1;
        }

        .ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 3px solid transparent;
            background: linear-gradient(#0f0c29, #0f0c29) padding-box,
                        linear-gradient(135deg, #a78bfa, #60a5fa, #34d399, #f472b6) border-box;
            opacity: 0;
            transition: opacity 0.4s;
            animation: spin-ring 3s linear infinite;
        }

        @keyframes spin-ring { to { transform: rotate(360deg); } }
        .ring.visible { opacity: 1; }

        #letter {
            font-size: 44vmin;
            font-weight: 900;
            line-height: 1;
            user-select: none;
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, #c4b5fd, #93c5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 20px rgba(167,139,250,0.3));
        }

        #letter.spinning {
            background: linear-gradient(135deg, #fde68a, #6ee7b7, #a5b4fc, #f9a8d4);
            -webkit-background-clip: text;
            background-clip: text;
            animation: shake 0.08s linear infinite;
        }

        @keyframes shake {
            0%   { transform: translate(-3px, 1px) rotate(-0.5deg); }
            25%  { transform: translate(3px, -1px) rotate(0.5deg); }
            50%  { transform: translate(-2px, 2px) rotate(-0.3deg); }
            75%  { transform: translate(2px, -2px) rotate(0.3deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        @keyframes pop-in {
            0%   { transform: scale(0.2) rotate(-15deg); opacity: 0; filter: blur(20px) drop-shadow(0 0 0 rgba(167,139,250,0)); }
            55%  { transform: scale(1.18) rotate(4deg); filter: blur(0) drop-shadow(0 0 60px rgba(167,139,250,0.9)); }
            75%  { transform: scale(0.94) rotate(-1deg); }
            90%  { transform: scale(1.04) rotate(0.5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; filter: drop-shadow(0 0 40px rgba(167,139,250,0.7)); }
        }

        #letter.final {
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            animation: pop-in 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* ---- Button row ---- */
        .btn-row {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            z-index: 1;
            margin-bottom: 0.7rem;
        }

        .btn-row-2 {
            display: flex;
            gap: 0.8rem;
            z-index: 1;
            margin-bottom: 2rem;
        }

        .btn-primary {
            position: relative;
            height: 3.2rem;
            padding: 0 2.8rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.9rem, 2vw, 1.35rem);
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            box-shadow: 0 8px 40px rgba(124,58,237,0.55);
            transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
            overflow: hidden;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
            border-radius: inherit;
            pointer-events: none;
        }

        .btn-primary.idle { animation: pulse 2.2s ease-in-out infinite; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 40px rgba(124,58,237,0.55), 0 0 0 0 rgba(124,58,237,0.35); }
            50%       { box-shadow: 0 8px 40px rgba(124,58,237,0.55), 0 0 0 18px rgba(124,58,237,0); }
        }

        .btn-primary:hover:not(:disabled) { transform: translateY(-4px) scale(1.04); }
        .btn-primary:active:not(:disabled) { transform: translateY(1px) scale(0.97); }
        .btn-primary:disabled { opacity: 0.5; cursor: default; animation: none; }

        /* START i ODLICZAJ — ta sama szerokość */
        #btn-start, #btn-countdown { width: 220px; }

        /* Odliczaj button */
        #btn-countdown {
            background: linear-gradient(135deg, #0891b2, #0e7490);
            box-shadow: 0 8px 40px rgba(8,145,178,0.45);
        }

        @keyframes pulse-teal {
            0%, 100% { box-shadow: 0 8px 40px rgba(8,145,178,0.45), 0 0 0 0 rgba(8,145,178,0.3); }
            50%       { box-shadow: 0 8px 40px rgba(8,145,178,0.45), 0 0 0 15px rgba(8,145,178,0); }
        }

        #btn-countdown.idle { animation: pulse-teal 2.2s ease-in-out infinite; }

        /* Nowa gra button */
        #btn-newgame {
            padding: 0 2rem;
            font-size: clamp(0.75rem, 1.4vw, 1rem);
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.15em;
            box-shadow: none;
            transition: border-color 0.2s, color 0.2s, transform 0.18s;
        }

        #btn-newgame:hover {
            border-color: rgba(255,255,255,0.5);
            color: rgba(255,255,255,0.9);
            transform: translateY(-2px);
            box-shadow: none;
        }

        #btn-newgame::after { display: none; }

        /* ---- Round counter ---- */
        #round-display {
            z-index: 1;
            color: rgba(255,255,255,0.5);
            font-size: clamp(1rem, 2.2vw, 1.4rem);
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }

        #round-display span {
            color: #a78bfa;
            font-size: 1.4em;
            font-weight: 900;
        }

        /* ---- Excluded table ---- */
        #excluded-section {
            z-index: 1;
            width: 100%;
            max-width: 600px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1rem 1.2rem 1.1rem;
            backdrop-filter: blur(10px);
        }

        #excluded-section h2 {
            color: rgba(255,255,255,0.45);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        #excluded-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .ex-chip {
            font-size: 1rem;
            font-weight: 800;
            padding: 0.3rem 0.65rem;
            border-radius: 8px;
            background: rgba(167,139,250,0.15);
            border: 1px solid rgba(167,139,250,0.3);
            color: #c4b5fd;
            letter-spacing: 0.05em;
            animation: chip-in 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }

        @keyframes chip-in {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        #empty-note {
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            font-style: italic;
        }

        /* ---- COUNTDOWN OVERLAY ---- */
        #countdown-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29ee 0%, #302b63ee 50%, #24243eee 100%);
            backdrop-filter: blur(6px);
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #countdown-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        #countdown-num {
            font-size: clamp(30vmin, 40vmin, 48vmin);
            font-weight: 900;
            line-height: 1;
            user-select: none;
            background: linear-gradient(135deg, #fbbf24, #f87171);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 40px rgba(251,191,36,0.5));
        }

        @keyframes num-pop {
            0%   { transform: scale(1.6); opacity: 0; filter: blur(10px) drop-shadow(0 0 0px rgba(251,191,36,0)); }
            50%  { transform: scale(0.9); filter: blur(0) drop-shadow(0 0 60px rgba(251,191,36,0.9)); }
            75%  { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 30px rgba(251,191,36,0.5)); }
        }

        #countdown-num.animate {
            animation: num-pop 0.45s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        /* urgent pulse for last 3 seconds */
        @keyframes urgent-pulse {
            0%, 100% { filter: drop-shadow(0 0 30px rgba(248,113,113,0.5)); }
            50%       { filter: drop-shadow(0 0 70px rgba(248,113,113,1)); }
        }

        #countdown-num.urgent {
            background: linear-gradient(135deg, #f87171, #fb923c);
            -webkit-background-clip: text;
            background-clip: text;
            animation: num-pop 0.45s cubic-bezier(0.34, 1.2, 0.64, 1) forwards,
                       urgent-pulse 0.5s ease-in-out infinite 0.45s;
        }

        @keyframes sprawdzam-pop {
            0%   { transform: scale(0.3); opacity: 0; filter: blur(20px); }
            60%  { transform: scale(1.1); filter: blur(0); }
            80%  { transform: scale(0.96); }
            100% { transform: scale(1); opacity: 1; }
        }

        #countdown-num.sprawdzam {
            font-size: clamp(12vmin, 18vmin, 24vmin);
            background: linear-gradient(135deg, #34d399, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            filter: drop-shadow(0 0 50px rgba(52,211,153,0.7));
            animation: sprawdzam-pop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        #countdown-dismiss {
            margin-top: 2rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            animation: fade-in 1.5s ease forwards;
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* Confetti canvas */
        #confetti {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
        }

        /* ---- ANSWERS OVERLAY ---- */
        #answers-overlay {
            position: fixed;
            inset: 0;
            z-index: 210;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 8, 30, 0.88);
            backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            padding: 1.5rem;
            overflow-y: auto;
        }

        #answers-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        #answers-panel {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        #answers-title {
            color: white;
            font-size: clamp(1.1rem, 3vw, 1.8rem);
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(167,139,250,0.7);
        }

        #answers-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.9rem;
            justify-content: center;
            width: 100%;
        }

        /* Flipcard */
        .answer-card {
            width: 155px;
            height: 110px;
            perspective: 800px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .answer-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            inset: 0;
            border-radius: 14px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            padding: 0.6rem;
        }

        .card-front {
            background: rgba(167,139,250,0.12);
            border: 1px solid rgba(167,139,250,0.35);
        }

        .card-front:hover {
            background: rgba(167,139,250,0.2);
            border-color: rgba(167,139,250,0.6);
        }

        .card-back {
            background: rgba(96,165,250,0.15);
            border: 1px solid rgba(96,165,250,0.45);
            transform: rotateY(180deg);
        }

        .card-cat {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
        }

        .card-front .card-cat { color: rgba(167,139,250,0.8); }
        .card-back  .card-cat { color: rgba(96,165,250,0.8); }

        .card-hint {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            font-style: italic;
        }

        .card-answer {
            font-size: clamp(0.95rem, 2vw, 1.15rem);
            font-weight: 800;
            color: white;
            text-align: center;
            line-height: 1.2;
        }

        #answers-dismiss {
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        /* Answers button — hidden until letter drawn */
        #btn-answers {
            background: linear-gradient(135deg, #03A9F4, #3F51B5);
            box-shadow: 0 8px 40px rgba(3,169,244,0.45);
            display: none;
        }

        @keyframes pulse-blue {
            0%, 100% { box-shadow: 0 8px 40px rgba(3,169,244,0.45), 0 0 0 0 rgba(3,169,244,0.3); }
            50%       { box-shadow: 0 8px 40px rgba(3,169,244,0.45), 0 0 0 15px rgba(3,169,244,0); }
        }

        #btn-answers.idle { animation: pulse-blue 2.2s ease-in-out infinite; }
    </style>
</head>
<body>

    <div class="orb" style="width:500px;height:500px;background:#7c3aed;top:-100px;left:-150px;animation-duration:18s;"></div>
    <div class="orb" style="width:400px;height:400px;background:#2563eb;bottom:-120px;right:-100px;animation-duration:22s;animation-delay:-7s;"></div>
    <div class="orb" style="width:300px;height:300px;background:#059669;top:40%;left:60%;animation-duration:15s;animation-delay:-3s;"></div>

    <canvas id="confetti"></canvas>

    <!-- Countdown overlay -->
    <div id="countdown-overlay">
        <div id="countdown-num">10</div>
        <div id="countdown-dismiss">kliknij aby wrócić</div>
    </div>

    <!-- Answers overlay -->
    <div id="answers-overlay">
        <div id="answers-panel">
            <div id="answers-title">Odpowiedzi — litera ?</div>
            <div id="answers-grid"></div>
            <div id="answers-dismiss">kliknij gdziekolwiek aby zamknąć</div>
        </div>
    </div>

    <div id="round-display">Runda <span id="round-num">0</span></div>
    <h1 class="title">Państwa i Miasta</h1>
    <p id="hint">naciśnij START aby wylosować literę</p>

    <div id="letter-wrap">
        <div class="ring" id="ring"></div>
        <div id="letter">?</div>
    </div>

    <div class="btn-row">
        <button id="btn-start" class="btn-primary idle">START</button>
        <button id="btn-countdown" class="btn-primary idle">Odliczaj</button>
    </div>
    <div class="btn-row">
        <button id="btn-answers" class="btn-primary">Odpowiedzi</button>
    </div>
    <div class="btn-row-2">
        <button id="btn-newgame" class="btn-primary">Nowa gra</button>
    </div>

    <div id="excluded-section">
        <h2>Wylosowane litery</h2>
        <div id="excluded-grid"></div>
    </div>

    <div id="footer" style="margin-top:2rem;color:rgba(255,255,255,0.2);font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;">
        stworzono z ❤️ przez <a href="https://melma.pl" title="Author page" style="color:rgba(255,255,255,0.4);text-decoration:underline;">melma.pl</a>
    </div>

    <script>
        const ALL_LETTERS = 'ABCDEFGHIJKLMNOPRSTUWYZ'.split('');
        const INITIAL_EXCLUDED = [];

        let excluded = new Set(INITIAL_EXCLUDED);
        let spinning = false;
        let countdownTimer = null;

        const letterEl      = document.getElementById('letter');
        const ringEl        = document.getElementById('ring');
        const btnStart      = document.getElementById('btn-start');
        const btnCD         = document.getElementById('btn-countdown');
        const btnNewGame    = document.getElementById('btn-newgame');
        const btnAnswers    = document.getElementById('btn-answers');
        const hintEl        = document.getElementById('hint');
        const gridEl        = document.getElementById('excluded-grid');
        const overlay       = document.getElementById('countdown-overlay');
        const answersOverlay = document.getElementById('answers-overlay');
        const answersGrid   = document.getElementById('answers-grid');
        const answersTitle  = document.getElementById('answers-title');
        const numEl         = document.getElementById('countdown-num');
        const roundNumEl    = document.getElementById('round-num');
        const canvas        = document.getElementById('confetti');
        const ctx           = canvas.getContext('2d');

        let round = 0;
        let currentLetter = null;
        let answersData = {};

        const CATEGORIES = ['Państwa','Miasta','Rośliny','Zwierzęta','Ciało','Rzeczy','Auta'];

        fetch('answers.json')
            .then(r => r.json())
            .then(data => { answersData = data; })
            .catch(() => { console.warn('Nie można załadować answers.json'); });

        /* ---- Answers panel ---- */
        function openAnswers() {
            if (!currentLetter) return;
            answersTitle.textContent = `Odpowiedzi — litera ${currentLetter}`;
            answersGrid.innerHTML = '';

            CATEGORIES.forEach(cat => {
                const pool = answersData[cat]?.[currentLetter];
                if (!pool || pool.length === 0) return;
                const answer = pool[Math.floor(Math.random() * pool.length)];

                const card = document.createElement('div');
                card.className = 'answer-card';
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            <span class="card-cat">${cat}</span>
                            <span class="card-hint">kliknij aby odkryć</span>
                        </div>
                        <div class="card-back">
                            <span class="card-cat">${cat}</span>
                            <span class="card-answer">${answer}</span>
                        </div>
                    </div>`;
                card.addEventListener('click', e => {
                    e.stopPropagation();
                    card.classList.toggle('flipped');
                    playClose();
                });
                answersGrid.appendChild(card);
            });

            answersOverlay.classList.add('active');
        }

        answersOverlay.addEventListener('click', () => {
            answersOverlay.classList.remove('active');
            playClose();
        });

        btnAnswers.addEventListener('click', openAnswers);

        /* ---- Audio ---- */
        let audioCtx = null;
        function ac() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function playTone({ freq = 440, type = 'sine', vol = 0.2, attack = 0.01, decay = 0.15, start = 0, freqEnd = null } = {}) {
            const c = ac(), t = c.currentTime + start;
            const osc = c.createOscillator();
            const gain = c.createGain();
            osc.connect(gain); gain.connect(c.destination);
            osc.type = type;
            osc.frequency.setValueAtTime(freq, t);
            if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, t + attack + decay);
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(vol, t + attack);
            gain.gain.exponentialRampToValueAtTime(0.0001, t + attack + decay);
            osc.start(t);
            osc.stop(t + attack + decay + 0.05);
        }

        /* tick during spin — pitch varies with letter */
        function playSpinTick(letterIdx) {
            playTone({ freq: 380 + letterIdx * 38, type: 'square', vol: 0.07, attack: 0.002, decay: 0.035 });
        }

        /* fanfare: ascending chord arpeggio */
        function playFanfare() {
            [523, 659, 784, 880, 1047].forEach((f, i) =>
                playTone({ freq: f, type: 'triangle', vol: 0.28, attack: 0.03, decay: 0.5, start: i * 0.11 })
            );
            /* bass thump */
            playTone({ freq: 130, type: 'sine', vol: 0.35, attack: 0.01, decay: 0.3 });
        }

        /* countdown tick — normal */
        function playTickNormal() {
            playTone({ freq: 660, type: 'sine', vol: 0.25, attack: 0.005, decay: 0.12 });
        }

        /* countdown tick — urgent (last 3 sec) */
        function playTickUrgent() {
            playTone({ freq: 1100, type: 'sine', vol: 0.32, attack: 0.005, decay: 0.09 });
            playTone({ freq: 1100, type: 'sine', vol: 0.18, attack: 0.005, decay: 0.09, start: 0.12 });
        }

        /* "Sprawdzam!" reveal */
        function playSprawdzam() {
            [392, 523, 659, 784, 1047, 1319].forEach((f, i) =>
                playTone({ freq: f, type: 'sine', vol: 0.25, attack: 0.02, decay: 0.6, start: i * 0.07 })
            );
        }

        /* nowa gra — descending whoosh */
        function playNewGame() {
            playTone({ freq: 900, freqEnd: 220, type: 'sine', vol: 0.25, attack: 0.01, decay: 0.35 });
            playTone({ freq: 440, type: 'triangle', vol: 0.12, attack: 0.01, decay: 0.2, start: 0.1 });
        }

        /* start countdown — rising swoosh */
        function playCountdownStart() {
            playTone({ freq: 200, freqEnd: 700, type: 'sine', vol: 0.2, attack: 0.05, decay: 0.3 });
        }

        /* overlay close — soft click */
        function playClose() {
            playTone({ freq: 300, type: 'sine', vol: 0.12, attack: 0.005, decay: 0.1 });
        }

        /* ---- Excluded grid ---- */
        function rebuildGrid() {
            gridEl.innerHTML = '';
            const sorted = ALL_LETTERS.filter(l => excluded.has(l));
            if (sorted.length === 0) {
                gridEl.innerHTML = '<span id="empty-note" style="color:rgba(255,255,255,0.2);font-size:0.8rem;font-style:italic">brak</span>';
                return;
            }
            sorted.forEach(l => {
                const chip = document.createElement('span');
                chip.className = 'ex-chip';
                chip.style.animationDelay = '0s';
                chip.textContent = l;
                gridEl.appendChild(chip);
            });
        }

        function addExcluded(letter) {
            excluded.add(letter);
            const chip = document.createElement('span');
            chip.className = 'ex-chip';
            chip.textContent = letter;
            const note = gridEl.querySelector('#empty-note');
            if (note) note.remove();
            const existing = [...gridEl.querySelectorAll('.ex-chip')];
            const after = existing.find(c => c.textContent > letter);
            if (after) gridEl.insertBefore(chip, after);
            else gridEl.appendChild(chip);
        }

        function available() {
            return ALL_LETTERS.filter(l => !excluded.has(l));
        }

        function syncStartBtn() {
            const rem = available();
            if (rem.length === 0) {
                btnStart.disabled = true;
                btnStart.textContent = 'KONIEC';
                hintEl.textContent = 'Wszystkie litery zostały wylosowane!';
            } else {
                btnStart.disabled = false;
            }
        }

        rebuildGrid();
        syncStartBtn();

        /* ---- Canvas resize ---- */
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        /* ---- Confetti ---- */
        let pieces = [], confettiRaf = null;

        function launchConfetti() {
            const colors = ['#a78bfa','#60a5fa','#34d399','#f472b6','#fbbf24','#f87171'];
            pieces = Array.from({ length: 180 }, () => ({
                x: Math.random() * canvas.width, y: -20,
                vx: (Math.random() - 0.5) * 4, vy: Math.random() * 4 + 2,
                size: Math.random() * 9 + 4,
                color: colors[Math.floor(Math.random() * colors.length)],
                rot: Math.random() * Math.PI * 2, rotV: (Math.random() - 0.5) * 0.15,
                shape: Math.random() > 0.45 ? 'rect' : 'circle', alpha: 1,
            }));
            if (!confettiRaf) drawConfetti();
        }

        function drawConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces = pieces.filter(p => p.alpha > 0.02);
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.rot += p.rotV; p.vx *= 0.99;
                if (p.y > canvas.height * 0.65) p.alpha -= 0.018;
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                if (p.shape === 'rect') ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
                else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
                ctx.restore();
            });
            if (pieces.length > 0) confettiRaf = requestAnimationFrame(drawConfetti);
            else { confettiRaf = null; ctx.clearRect(0,0,canvas.width,canvas.height); }
        }

        /* ---- Countdown ---- */
        function setCountNum(text, cls) {
            numEl.className = '';
            void numEl.offsetWidth;
            numEl.textContent = text;
            numEl.className = cls;
        }

        function startCountdown() {
            clearInterval(countdownTimer);
            let count = 10;
            setCountNum(count, 'animate');
            overlay.classList.add('active');
            playCountdownStart();
            setTimeout(() => playTickNormal(), 400);

            countdownTimer = setInterval(() => {
                count--;
                if (count < 0) {
                    clearInterval(countdownTimer);
                    setCountNum('Sprawdzam!', 'sprawdzam');
                    playSprawdzam();
                } else if (count <= 3) {
                    setCountNum(count, 'urgent');
                    playTickUrgent();
                } else {
                    setCountNum(count, 'animate');
                    playTickNormal();
                }
            }, 1000);
        }

        function closeCountdown() {
            clearInterval(countdownTimer);
            overlay.classList.remove('active');
            playClose();
        }

        overlay.addEventListener('click', closeCountdown);

        btnCD.addEventListener('click', startCountdown);

        /* ---- Spin ---- */
        btnStart.addEventListener('click', () => {
            if (spinning) return;
            const pool = available();
            if (pool.length === 0) return;

            spinning = true;
            btnStart.disabled = true;
            btnStart.classList.remove('idle');
            hintEl.textContent = '';

            const final = pool[Math.floor(Math.random() * pool.length)];

            letterEl.classList.remove('final', 'spinning');
            void letterEl.offsetWidth;
            letterEl.classList.add('spinning');
            ringEl.classList.add('visible');

            const schedule = [
                ...Array(25).fill(55),
                ...Array(10).fill(90),
                ...Array(8).fill(140),
                ...Array(6).fill(220),
                ...Array(4).fill(350),
                ...Array(2).fill(500),
            ];

            let i = 0;
            function tick() {
                if (i < schedule.length) {
                    const idx = Math.floor(Math.random() * ALL_LETTERS.length);
                    letterEl.textContent = ALL_LETTERS[idx];
                    playSpinTick(idx);
                    setTimeout(tick, schedule[i++]);
                } else {
                    letterEl.classList.remove('spinning');
                    void letterEl.offsetWidth;
                    letterEl.textContent = final;
                    letterEl.classList.add('final');
                    ringEl.classList.remove('visible');

                    addExcluded(final);
                    currentLetter = final;
                    btnAnswers.style.display = 'inline-flex';
                    btnAnswers.classList.add('idle');
                    round++;
                    roundNumEl.textContent = round;
                    setTimeout(launchConfetti, 200);
                    setTimeout(playFanfare, 150);

                    spinning = false;
                    const rem = available();
                    if (rem.length === 0) {
                        btnStart.disabled = true;
                        btnStart.textContent = 'KONIEC';
                        hintEl.textContent = 'Wszystkie litery zostały wylosowane!';
                    } else {
                        btnStart.disabled = false;
                        btnStart.textContent = 'LOSUJ';
                        btnStart.classList.add('idle');
                        hintEl.textContent = `pozostało ${rem.length} liter`;
                    }
                }
            }
            tick();
        });

        /* ---- Nowa gra ---- */
        btnNewGame.addEventListener('click', () => {
            excluded = new Set();
            round = 0;
            currentLetter = null;
            roundNumEl.textContent = round;
            rebuildGrid();
            letterEl.className = '';
            letterEl.textContent = '?';
            btnStart.disabled = false;
            btnStart.textContent = 'START';
            btnStart.classList.add('idle');
            btnAnswers.style.display = 'none';
            btnAnswers.classList.remove('idle');
            hintEl.textContent = 'naciśnij START aby wylosować literę';
            spinning = false;
            playNewGame();
        });

        /* ---- Service Worker ---- */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
        }
    </script>
</body>
</html>
